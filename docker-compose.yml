services:
  
  web:
    
    # What dockerfile to run (looks for it automatically)
    build: .
    container_name: debate-tools
    # Exposes ports from 8000 to 8000
    ports:
      - 8000:8000
    volumes:
      - ./debate-tools:/app
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
  db:
    image: postgres:18
    container_name: postgres_db
    volumes:
      - postgres_db:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  postgres_db: