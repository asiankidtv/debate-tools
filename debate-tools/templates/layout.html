<!DOCTYPE html>
<html lang="en" data-bs-core="modern">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Halfmoon CSS Implementation ADD CUSTOM CSS AFTER-->
    <link href="https://cdn.jsdelivr.net/npm/halfmoon@2.0.2/css/halfmoon.min.css" rel="stylesheet" integrity="sha256-RjeFzczeuZHCyS+Gvz+kleETzBF/o84ZRHukze/yv6o=" crossorigin="anonymous">
    
    <title>{% block title %}{% endblock %}</title>
</head>
<body class="bg-light">
    <!--Halfmoon JS Library (Same as Bootstrap Bundle)-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha256-CDOy6cOibCWEdsRiZuaHf8dSGGJRYuBGC+mjoJimHGw=" crossorigin="anonymous"></script>

    <nav class="navbar navbar-expand-md" style="background-color: var(--bs-content-bg); border-bottom: var(--bs-border-width) solid var(--bs-content-border-color);">
    <div class="container-fluid">
        Debate Tools
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-collapse-2" aria-controls="navbar-collapse-2" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar-collapse-2">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="">Home</a>
            </li>
            <a class="nav-link" href="/viewer">Case Viewer</a>
            <li class="nav-item">
            <a class="nav-link" href="#" role="button" aria-expanded="false">Card Cutter</a>
            </li>
        </ul>
        </div>
    </div>
    </nav>

    
    {% block body %}
    {% endblock %}
</body>
</html>
